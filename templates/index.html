<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وادي AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🌊 وادي AI</h2>
                <button onclick="newChat()">+ محادثة جديدة</button>
            </div>
            <div id="chat-list" class="chat-list"></div>
            <div class="sidebar-footer">
                <span>{{ user_name }}</span>
                <a href="{{ url_for('auth.logout') }}">خروج</a>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="main">
            <div class="chat-header">
                <select id="mode-select">
                    <option value="fast">سريع ⚡</option>
                    <option value="detailed">تفصيلي 📝</option>
                    <option value="creative">إبداعي 🎨</option>
                    <option value="coding">برمجة 💻</option>
                    <option value="analysis">تحليلي 📊</option>
                    <option value="research">باحث 🔬</option>
                    <option value="summarize">ملخص 📄</option>
                    <option value="teacher">أستاذ 🎓</option>
                    <option value="translate">مترجم 🌐</option>
                </select>
                <button id="share-btn" onclick="shareChat()" style="display:none;">مشاركة 🔗</button>
            </div>

            <div id="chat-box" class="chat-box">
                <div class="welcome">
                    <h1>مرحبا {{ user_name }} 👋</h1>
                    <p>اختار الوضع وابدأ الدردشة مع وادي AI</p>
                </div>
            </div>

            <div class="input-area">
                <input type="file" id="file-input" hidden accept=".pdf,.png,.jpg,.jpeg,.txt">
                <button onclick="document.getElementById('file-input').click()">📎</button>
                <textarea id="user-input" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                <button id="send-btn" onclick="sendMessage()">إرسال</button>
            </div>
            <div id="file-name" class="file-name"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
